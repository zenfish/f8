    tableScroll.addEventListener('scroll', render);
    window.addEventListener('resize', render);
    
    // I/O popup
    document.addEventListener('click', e => {
        const link = e.target.closest('.io-link');
        if (link) {
            e.stopPropagation();
            const filename = link.dataset.io;
            const base = filename.replace(/\.(hexdump|rendered)$/, '').replace(/\.bin$/, '');
            const chunkIdx = link.dataset.chunk;
            
            // Get target from data attribute (raw target, not display text)
            const row = link.closest('.row');
            const targetCell = row?.querySelector('.col-target');
            const target = targetCell?.dataset?.target;
            
            let html = '';
            
            // PRIMARY: Conversation view (all R/W for target) - this is what you usually want
            if (target && target !== '—') {
                html += `<a href="/hexdump.html?trace=${currentTrace.id}&target=${encodeURIComponent(target)}" target="_blank"><strong>💬 View I/O</strong> (all R+W)</a>`;
            }
            
            // Secondary: single-file options
            let singleFileUrl = `/hexdump.html?trace=${currentTrace.id}&file=${encodeURIComponent(base)}.bin`;
            if (chunkIdx !== undefined) singleFileUrl += `&chunk=${chunkIdx}`;
            
            html += `<a href="${singleFileUrl}" target="_blank" style="color:#888">This chunk only</a>`;
            html += `<a href="/api/traces/${currentTrace.id}/io/${base}.bin" target="_blank" style="color:#888">Download .bin</a>`;
            
            ioPopup.innerHTML = html;
            const rect = link.getBoundingClientRect();
            ioPopup.style.left = rect.left + 'px';
            ioPopup.style.top = (rect.bottom + 4) + 'px';
            ioPopup.classList.add('show');
        } else {
            ioPopup.classList.remove('show');
        }
        
        // Data preview: click to expand/collapse
        const preview = e.target.closest('.data-preview');
        if (preview && preview.dataset.full) {
            e.stopPropagation();
            if (preview.classList.toggle('expanded')) {
                preview.textContent = '"' + preview.dataset.full + '"';
            } else {
                preview.textContent = '"' + preview.dataset.short + '..."';
            }
        }
        
        // DNS jump links
        const dnsJump = e.target.closest('.dns-jump');
        if (dnsJump) {
            e.preventDefault();
            const seq = parseInt(dnsJump.dataset.seq, 10);
            scrollToSeq(seq);
        }
    });
    
    // Scroll to a specific seq number
    function scrollToSeq(seq) {
        // Find the index of this seq in filteredEvents
        const idx = filteredEvents.findIndex(e => e.seq === seq);
        if (idx >= 0) {
            // Scroll to that position
            const scrollTop = idx * ROW_HEIGHT - (tableScroll.clientHeight / 2) + ROW_HEIGHT;
            tableScroll.scrollTop = Math.max(0, scrollTop);
            render();
            // Briefly highlight the row
            setTimeout(() => {
                const row = viewport.querySelector(`[data-seq="${seq}"]`);
                if (row) {
                    row.style.outline = '2px solid #3498db';
                    row.style.outlineOffset = '-2px';
                    setTimeout(() => {
                        row.style.outline = '';
                        row.style.outlineOffset = '';
                    }, 2000);
                }
            }, 100);
        } else {
            // Event not in current filter, try resetting filter
            currentFilter = 'all';
            searchTerm = '';
            applyFilter();
            setTimeout(() => scrollToSeq(seq), 100);
        }
    }
    
    // ===== Process Tree View =====
    
    async function loadTree(traceId) {
        treeLoading.style.display = '';
        treeContent.innerHTML = '';
        
        try {
            treeData = await fetchJson(`/api/traces/${traceId}/process-tree`);
            treeLoading.style.display = 'none';
            renderTree(treeData);
        } catch (e) {
            treeLoading.textContent = 'Error loading tree: ' + e.message;
        }
    }
    
    function renderTree(data) {
        const nodeMap = new Map();
        data.nodes.forEach(n => nodeMap.set(n.pid, n));
        
        // Determine initial expansion depth based on tree size
        const totalNodes = data.nodes.length;
        let defaultDepth = 3;
        if (totalNodes > 500) defaultDepth = 2;
        if (totalNodes > 5000) defaultDepth = 1;
        
        // Separate root tree from orphan trees
        const rootNode = nodeMap.get(data.rootPid);
        
        // Find all root-level nodes (no parent)
        const allRoots = data.nodes.filter(n => n.parentPid === null);
        // Separate: the main root, other roots with subtrees, and bare orphans
        const mainRoot = rootNode || allRoots[0];
        const otherRoots = allRoots.filter(n => n !== mainRoot && (n.childPids.length > 0 || n.programs.length > 0 || n.io.totalRead > 0 || n.io.totalWrite > 0));
        // Bare orphans: no children, no program, no I/O — but still show what syscalls they made
        const bareOrphans = allRoots.filter(n => n !== mainRoot && n.childPids.length === 0 && n.programs.length === 0 && !n.io.totalRead && !n.io.totalWrite);
        
        let html = '';
        
        // Summary bar
        const rootTreeSize = mainRoot ? countDescendants(mainRoot, nodeMap) + 1 : 0;
        const orphanCount = allRoots.length - 1;
        html += `<div style="font-size:12px;color:#666;margin-bottom:12px;padding:8px 12px;background:#f0f0f0;border-radius:4px">
            <strong>${totalNodes.toLocaleString()}</strong> processes · 
            <strong>${data.totalExecCount}</strong> programs exec'd · 
            <strong>${rootTreeSize.toLocaleString()}</strong> in root tree` +
            (orphanCount > 0 ? ` · <strong>${orphanCount.toLocaleString()}</strong> orphan${orphanCount !== 1 ? 's' : ''} (no traced parent)` : '') +
        `</div>`;
        
        // Main root tree
        if (mainRoot) {
            html += renderTreeNode(mainRoot, nodeMap, 0, defaultDepth, true);
        }
        
        // Other roots with subtrees (non-trivial orphans)
        if (otherRoots.length > 0) {
            html += `<div style="margin-top:16px;padding-top:12px;border-top:2px solid #ddd">
                <div style="font-size:12px;color:#888;margin-bottom:8px;font-weight:600">
                    <span class="tree-toggle" data-action="toggle-section" data-section="other-roots">▼</span>
                    Other Process Trees (${otherRoots.length})
                </div>
                <div class="tree-children" data-section-content="other-roots">`;
            for (const orphanRoot of otherRoots) {
                html += renderTreeNode(orphanRoot, nodeMap, 0, Math.min(defaultDepth, 1), true);
            }
            html += `</div></div>`;
        }
        
        // Bare orphans: no children, no program, no I/O — but classify by what they did
        if (bareOrphans.length > 0) {
            // Separate into getpid-only (truly trivial) vs. anything else
            const trivialOrphans = []; // only getpid/geteuid/getuid/getgid/getegid/getppid
            const nonTrivialOrphans = []; // did something beyond identity checks
            const trivialSyscalls = new Set(['getpid','geteuid','getuid','getgid','getegid','getppid']);
            
            for (const n of bareOrphans) {
                // Check if this PID did anything beyond trivial identity syscalls
                // We don't have per-PID syscall breakdown in tree data, so use eventCount as heuristic
                // Anything with events > 0 that ISN'T in the programs/IO set needs individual checking
                // For now, bucket by event count but show ALL of them
                if (n.eventCount <= 5) {
                    trivialOrphans.push(n);
                } else {
                    nonTrivialOrphans.push(n);
                }
            }
            
            html += `<div style="margin-top:16px;padding-top:12px;border-top:2px solid #ddd">`;
            
            // Non-trivial orphans first (security-relevant — they did real work)
            if (nonTrivialOrphans.length > 0) {
                html += `<div style="font-size:12px;color:#c0392b;margin-bottom:8px;font-weight:600">
                    <span class="tree-toggle" data-action="toggle-section" data-section="active-orphans">▼</span>
                    ⚠ Active Orphan Processes (${nonTrivialOrphans.length} PIDs — no known parent, but had activity)
                </div>
                <div class="tree-children" data-section-content="active-orphans">`;
                for (const orphan of nonTrivialOrphans) {
                    html += renderTreeNode(orphan, nodeMap, 0, 0, true);
                }
                html += `</div>`;
            }
            
            // Trivial orphans (getpid-only etc.)
            if (trivialOrphans.length > 0) {
                const ranges = groupPidRanges(trivialOrphans.map(n => n.pid));
                html += `<div style="font-size:12px;color:#888;margin-bottom:8px;margin-top:12px;font-weight:600">
                    <span class="tree-toggle" data-action="toggle-section" data-section="trivial-orphans">▶</span>
                    Ephemeral Processes (${trivialOrphans.length.toLocaleString()} PIDs — ≤5 events each, likely shell subshells)
                </div>
                <div class="tree-children collapsed" data-section-content="trivial-orphans">
                    <div style="padding:8px 12px;font-size:11px;color:#666;margin-bottom:8px">
                        These processes were detected by DTrace (progenyof match) but only called identity syscalls (getpid, geteuid, etc.) before exiting.
                        Typically short-lived shell subshells or pipe stages. Click any PID to view its timeline.
                    </div>
                    <div style="padding:4px 12px;font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#888;max-height:300px;overflow-y:auto;line-height:1.6">
                        ${ranges.map(r => {
                            if (r.length === 1) {
                                const n = nodeMap.get(r[0]);
                                const evts = n ? n.eventCount : '?';
                                return `<span style="display:inline-block;margin:1px 4px;padding:1px 6px;background:#f0f0f0;border-radius:3px;cursor:pointer" data-action="timeline" data-pid="${r[0]}" title="PID ${r[0]}: ${evts} events">${r[0]}</span>`;
                            } else {
                                return `<span style="display:inline-block;margin:1px 4px;padding:1px 6px;background:#f0f0f0;border-radius:3px">${r[0]}–${r[1]} <span style="color:#aaa">(${r[1]-r[0]+1})</span></span>`;
                            }
                        }).join('')}
                    </div>
                </div>`;
            }
            
            html += `</div>`;
        }
        
        treeContent.innerHTML = html;
        
        // Attach tree event handlers (re-bind since we replaced innerHTML)
        treeContent.addEventListener('click', handleTreeClick);
    }
    
    function countDescendants(node, nodeMap) {
        let count = 0;
        if (!node.childPids) return 0;
        for (const cpid of node.childPids) {
            count++;
            const child = nodeMap.get(cpid);
            if (child) count += countDescendants(child, nodeMap);
        }
        return count;
    }
    
    // Group consecutive PIDs into ranges: [[start, end], [single], ...]
    function groupPidRanges(pids) {
        if (pids.length === 0) return [];
        const sorted = [...pids].sort((a, b) => a - b);
        const ranges = [];
        let start = sorted[0], end = sorted[0];
        for (let i = 1; i < sorted.length; i++) {
            if (sorted[i] <= end + 2) { // Allow gaps of 1 (e.g. 100,102 = range)
                end = sorted[i];
            } else {
                ranges.push(start === end ? [start] : [start, end]);
                start = end = sorted[i];
            }
        }
        ranges.push(start === end ? [start] : [start, end]);
        return ranges;
    }
    
    // Build a one-line children summary: "3 children: 2× bash, 1× git"
    function buildChildrenSummary(node, nodeMap) {
        if (!node.childPids || node.childPids.length === 0) return '';
        
        const progCounts = new Map();
        let totalChildren = 0;
        
        function countAll(pid) {
            const child = nodeMap.get(pid);
            if (!child) return;
            totalChildren++;
            const prog = child.programs.length > 0 ? child.programs[child.programs.length - 1].split('/').pop() : '(fork)';
            progCounts.set(prog, (progCounts.get(prog) || 0) + 1);
            if (child.childPids) child.childPids.forEach(countAll);
        }
        node.childPids.forEach(countAll);
        
        if (totalChildren === 0) return '';
        
        // Sort by count descending, show top 4
        const sorted = [...progCounts.entries()].sort((a, b) => b[1] - a[1]);
        const shown = sorted.slice(0, 4);
        const rest = sorted.slice(4).reduce((s, e) => s + e[1], 0);
        
        let desc = shown.map(([prog, count]) => count > 1 ? `${count}× ${escapeHtml(prog)}` : escapeHtml(prog)).join(', ');
        if (rest > 0) desc += `, +${rest} more`;
        
        const directCount = node.childPids.length;
        const label = directCount === totalChildren
            ? `${totalChildren} child${totalChildren !== 1 ? 'ren' : ''}`
            : `${directCount} direct, ${totalChildren} total`;
        
        return `<div class="tree-children-summary" style="font-size:10px;color:#888;margin-top:2px">↳ ${label}: ${desc}</div>`;
    }
    
    function renderTreeNode(node, nodeMap, depth, expandDepth, isRoot) {
        const hasChildren = node.childPids && node.childPids.length > 0;
        const isExpanded = depth < expandDepth;
        const program = node.programs.length > 0 ? node.programs[node.programs.length - 1] : '';
        const programShort = program ? program.split('/').pop() : '';
        const isInferred = node.programSource === 'inferred';
        const programFull = program 
            ? (isInferred ? `${program} (inferred from open)` : program) 
            : `(no exec — ${node.eventCount} events)`;
        
        // Build I/O summary line
        const io = node.io;
        const statsHtml = buildTreeStats(io, node.execCount, node.eventCount);
        
        // Build children summary (line 2)
        const childrenSummary = buildChildrenSummary(node, nodeMap);
        
        // Group children by program if there are many similar leaf children
        let childrenHtml = '';
        if (hasChildren && isExpanded) {
            childrenHtml = renderTreeChildren(node, nodeMap, depth + 1, expandDepth);
        }
        
        const rootClass = isRoot ? ' root' : '';
        const toggleIcon = hasChildren ? (isExpanded ? '▼' : '▶') : '·';
        const toggleClass = hasChildren ? 'tree-toggle' : 'tree-toggle" style="color:#ccc;cursor:default';
        
        const [depthBg, depthFg] = DEPTH_COLORS[depth % DEPTH_COLORS.length];
        
        return `
            <div class="tree-node${rootClass}" data-pid="${node.pid}">
                <div class="tree-card-wrap">
                    <span class="${toggleClass}" data-action="toggle" data-pid="${node.pid}">${toggleIcon}</span>
                    <div class="tree-card" data-pid="${node.pid}">
                        <div class="tree-pid-badge" style="background:${depthBg};color:${depthFg}">${node.pid}</div>
                        <div class="tree-card-body">
                            <div class="tree-program" title="${escapeHtml(programFull)}">${isInferred ? '<span style="color:#8e44ad" title="Inferred from first binary open()">≈ </span>' : ''}${escapeHtml(programShort || '(shell)')}</div>
                            <div class="tree-stats">${statsHtml}</div>
                            ${childrenSummary}
                        </div>
                        <div class="tree-actions">
                            <button data-action="timeline" data-pid="${node.pid}" title="View timeline for PID ${node.pid} and children">📊 Timeline</button>
                        </div>
                    </div>
                </div>
                ${hasChildren ? `<div class="tree-children${isExpanded ? '' : ' collapsed'}" data-parent="${node.pid}">${childrenHtml}</div>` : ''}
            </div>
        `;
    }
    
    function renderTreeChildren(parentNode, nodeMap, depth, expandDepth) {
        const childPids = parentNode.childPids;
        if (!childPids || childPids.length === 0) return '';
        
        // Group leaf children (no children of their own) by program name
        const leafGroups = new Map(); // programName → [nodes]
        const nonLeafChildren = [];
        const leafSingles = [];
        
        for (const pid of childPids) {
            const child = nodeMap.get(pid);
            if (!child) continue;
            
            const isLeaf = !child.childPids || child.childPids.length === 0;
            if (isLeaf) {
                const prog = child.programs.length > 0 ? child.programs[child.programs.length - 1] : '(no exec)';
                if (!leafGroups.has(prog)) leafGroups.set(prog, []);
                leafGroups.get(prog).push(child);
            } else {
                nonLeafChildren.push(child);
            }
        }
        
        // Separate leaf groups: singles go inline, groups of 3+ get grouped
        for (const [prog, nodes] of leafGroups) {
            if (nodes.length >= 3) {
                // Keep as group
            } else {
                leafSingles.push(...nodes);
                leafGroups.delete(prog);
            }
        }
        
        let html = '';
        
        // Render non-leaf children first (they have subtrees)
        for (const child of nonLeafChildren) {
            html += renderTreeNode(child, nodeMap, depth, expandDepth, false);
        }
        
        // Render individual leaf children
        for (const child of leafSingles) {
            html += renderTreeNode(child, nodeMap, depth, expandDepth, false);
        }
        
        // Render grouped leaf children
        for (const [prog, nodes] of leafGroups) {
            const progShort = prog.split('/').pop();
            const totalRead = nodes.reduce((s, n) => s + (n.io.totalRead || 0), 0);
            const totalWrite = nodes.reduce((s, n) => s + (n.io.totalWrite || 0), 0);
            const pids = nodes.map(n => n.pid).join(', ');
            
            html += `
                <div class="tree-node">
                    <div class="tree-card-wrap">
                        <span class="tree-toggle" data-action="expand-group" data-parent="${parentNode.pid}" data-program="${escapeHtml(prog)}">▶</span>
                        <div class="tree-group-summary" data-action="expand-group" data-parent="${parentNode.pid}" data-program="${escapeHtml(prog)}" title="PIDs: ${pids}">
                            <span class="tree-group-count">${nodes.length}×</span>
                            <span>${escapeHtml(progShort)}</span>
                            ${totalRead || totalWrite ? `<span style="margin-left:8px;color:#888">R:${formatBytes(totalRead)} W:${formatBytes(totalWrite)}</span>` : ''}
                        </div>
                    </div>
                    <div class="tree-children collapsed" data-group-parent="${parentNode.pid}" data-group-program="${escapeHtml(prog)}">
                        ${nodes.map(n => renderTreeNode(n, nodeMap, depth, depth, false)).join('')}
                    </div>
                </div>
            `;
        }
        
        return html;
    }
    
    function buildTreeStats(io, execCount, eventCount) {
        const parts = [];
        if (io.totalRead || io.totalWrite) {
            parts.push(`<span class="tree-stat"><span class="tree-stat-label">I/O</span> R:${formatBytes(io.totalRead)} W:${formatBytes(io.totalWrite)}</span>`);
        }
        if (io.netRead || io.netWrite) {
            parts.push(`<span class="tree-stat"><span class="tree-stat-label">Net</span> ↓${formatBytes(io.netRead)} ↑${formatBytes(io.netWrite)}</span>`);
        }
        if (io.fileRead || io.fileWrite) {
            parts.push(`<span class="tree-stat"><span class="tree-stat-label">Files</span> ↓${formatBytes(io.fileRead)} ↑${formatBytes(io.fileWrite)}</span>`);
        }
        if (execCount > 0) {
            parts.push(`<span class="tree-stat"><span class="tree-stat-label">Exec</span> ${execCount}</span>`);
        }
        if (parts.length === 0 && eventCount) {
            return `<span class="tree-stat" style="color:#aaa">${eventCount} event${eventCount !== 1 ? 's' : ''}, no I/O</span>`;
        }
        return parts.join('') || '<span class="tree-stat" style="color:#aaa">no I/O</span>';
    }
    
    function handleTreeClick(e) {
        const target = e.target.closest('[data-action]');
        if (!target) return;
        
        const action = target.dataset.action;
        
        if (action === 'toggle') {
            const pid = parseInt(target.dataset.pid, 10);
            const nodeEl = target.closest('.tree-node');
            const childrenEl = nodeEl.querySelector(`:scope > .tree-children`);
            if (!childrenEl) return;
            
            const isCollapsed = childrenEl.classList.contains('collapsed');
            childrenEl.classList.toggle('collapsed');
            target.textContent = isCollapsed ? '▼' : '▶';
            
            // Lazy-render children if they're empty (were initially collapsed)
            if (isCollapsed && childrenEl.innerHTML.trim() === '' && treeData) {
                const nodeMap = new Map();
                treeData.nodes.forEach(n => nodeMap.set(n.pid, n));
                const node = nodeMap.get(pid);
                if (node) {
                    childrenEl.innerHTML = renderTreeChildren(node, nodeMap, 0, 0);
                }
            }
        }
        
        if (action === 'toggle-section') {
            const section = target.dataset.section;
            const contentEl = treeContent.querySelector(`[data-section-content="${section}"]`);
            if (!contentEl) return;
            const isCollapsed = contentEl.classList.contains('collapsed');
            contentEl.classList.toggle('collapsed');
            target.textContent = isCollapsed ? '▼' : '▶';
        }
        
        if (action === 'expand-group') {
            const groupEl = target.closest('.tree-node');
            const childrenEl = groupEl.querySelector('.tree-children');
            if (!childrenEl) return;
            
            const toggle = groupEl.querySelector('.tree-toggle');
            const isCollapsed = childrenEl.classList.contains('collapsed');
            childrenEl.classList.toggle('collapsed');
            if (toggle) toggle.textContent = isCollapsed ? '▼' : '▶';
        }
        
        if (action === 'timeline') {
            e.stopPropagation();
            const pid = parseInt(target.dataset.pid, 10);
            openPidTimeline(pid);
        }
    }
    
    function openPidTimeline(pid) {
        if (!currentTrace || !treeData) return;
        
        // Collect this PID and all descendant PIDs
        const nodeMap = new Map();
        treeData.nodes.forEach(n => nodeMap.set(n.pid, n));
        
        const pids = new Set();
        function collectPids(p) {
            pids.add(p);
            const node = nodeMap.get(p);
            if (node && node.childPids) {
                node.childPids.forEach(collectPids);
            }
        }
        collectPids(pid);
        
        // Open a new window matching the current window size
        const pidList = Array.from(pids).join(',');
        const node = nodeMap.get(pid);
        const progName = node?.programs?.length ? node.programs[node.programs.length - 1].split('/').pop() : '';
        const url = `/index.html?trace=${currentTrace.id}&pids=${pidList}&root=${pid}&prog=${encodeURIComponent(progName)}&total=${pids.size}`;
        const SUBTREE_WINDOW_OFFSET = 40;
        const w = window.outerWidth;
        const h = window.outerHeight;
        const x = window.screenX + SUBTREE_WINDOW_OFFSET;
        const y = window.screenY + SUBTREE_WINDOW_OFFSET;
        const sizeParams = `&winW=${w}&winH=${h}&winX=${x}&winY=${y}`;
        window.open(url + sizeParams, `timeline-${pid}`, 'popup');
    }
    
    // Check URL params for PID-filtered timeline mode
    function checkUrlParams() {
        const params = new URLSearchParams(window.location.search);
        
        // Self-resize if opened as a sub-timeline popup
        const winW = params.get('winW');
        const winH = params.get('winH');
        const winX = params.get('winX');
        const winY = params.get('winY');
        if (winW && winH) {
            try {
                window.resizeTo(parseInt(winW), parseInt(winH));
                if (winX && winY) window.moveTo(parseInt(winX), parseInt(winY));
            } catch(e) { /* browser may block */ }
        }
        
        const traceId = params.get('trace');
        const pids = params.get('pids');
        const rootPid = params.get('root');
        const progName = params.get('prog') || '';
        const totalPids = params.get('total') || '?';
        
        if (traceId) {
            traceSelect.value = traceId;
            loadTrace(traceId).then(() => {
                if (pids) {
                    const pidSet = new Set(pids.split(',').map(Number));
                    allEvents = allEvents.filter(e => pidSet.has(e.pid));
                    filteredEvents = allEvents;
                    sortData();
                    updateStatus();
                    render();
                    
                    // Rebuild summary and filters from the filtered subset
                    renderSubsetSummary(rootPid, progName, pidSet, totalPids);
                    rebuildFilterButtons();
                    
                    // Update title
                    const label = progName || `PID ${rootPid}`;
                    document.title = `mactrace — ${label} (${pidSet.size} processes)`;
                    
                    // Hide the view toggle in sub-windows
                    viewToggle.style.display = 'none';
                }
            });
            return true;
        }
        return false;
    }
    
    function rebuildFilterButtons() {
        // Recount categories from the current allEvents (subset-aware)
        const cats = {};
        let errors = 0;
        for (const e of allEvents) {
            cats[e.category] = (cats[e.category] || 0) + 1;
            if (e.errno !== 0) errors++;
        }
        
        let btns = `<button class="filter-btn active" data-filter="all" style="background:#666;color:#fff">All (${allEvents.length.toLocaleString()})</button>`;
        const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
        for (const [cat, count] of sorted) {
            const col = catColors[cat] || {bg:'#999', text:'#fff'};
            btns += `<button class="filter-btn" data-filter="${cat}" style="background:${col.bg};color:${col.text}">${cat} (${count.toLocaleString()})</button>`;
        }
        if (errors > 0) {
            btns += `<button class="filter-btn" data-filter="error" style="background:#e74c3c;color:#fff">Errors (${errors.toLocaleString()})</button>`;
        }
        btns += '<input type="text" class="search-box" id="search" placeholder="Search syscall, target, details...">';
        btns += '<span class="status" id="status"></span>';
        filters.innerHTML = btns;
        updateStatus();
    }
    
    function renderSubsetSummary(rootPid, progName, pidSet, totalPids) {
        // Compute stats from the filtered events
        const events = allEvents;
        const eventCount = events.length;
        const uniquePids = new Set(events.map(e => e.pid));
        const errorCount = events.filter(e => e.errno !== 0).length;
        
        // Syscall counts
        const syscallCounts = {};
        const catCounts = {};
        let totalRead = 0, totalWrite = 0;
        let netRecv = 0, netSend = 0;
        const netConnections = new Set();
        const fileReads = new Map(), fileWrites = new Map();
        
        for (const e of events) {
            syscallCounts[e.syscall] = (syscallCounts[e.syscall] || 0) + 1;
            catCounts[e.category] = (catCounts[e.category] || 0) + 1;
            
            if (e._read > 0) {
                totalRead += e._read;
                if (e.target?.match(/^\d+\.\d+\.\d+\.\d+:/) || e.target?.startsWith('AF_')) {
                    netRecv += e._read;
                    netConnections.add(e.target);
                } else if (e.target?.startsWith('/')) {
                    fileReads.set(e.target, (fileReads.get(e.target) || 0) + e._read);
                }
            }
            if (e._write > 0) {
                totalWrite += e._write;
                if (e.target?.match(/^\d+\.\d+\.\d+\.\d+:/) || e.target?.startsWith('AF_')) {
                    netSend += e._write;
                    netConnections.add(e.target);
                } else if (e.target?.startsWith('/')) {
                    fileWrites.set(e.target, (fileWrites.get(e.target) || 0) + e._write);
                }
            }
        }
        
        const topSyscalls = Object.entries(syscallCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8)
            .map(([syscall, count]) => ({syscall, count}));
        
        const execCount = events.filter(e => (e.syscall === 'execve' || e.syscall === 'posix_spawn') && e.errno === 0).length;
        
        const label = progName ? `${progName} (PID ${rootPid})` : `PID ${rootPid}`;
        
        // I/O summary
        const topFiles = [...fileReads.entries(), ...fileWrites.entries()]
            .reduce((map, [path, bytes]) => { map.set(path, (map.get(path) || 0) + bytes); return map; }, new Map());
        const topFilesSorted = [...topFiles.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5);
        
        summary.innerHTML = `
            <h2 style="display:flex;align-items:center;gap:10px">
                <span style="background:var(--c-primary);color:white;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600">SUBTREE</span>
                ${escapeHtml(label)}
                <span style="font-size:13px;font-weight:400;color:var(--c-text-muted)">
                    — ${uniquePids.size} process${uniquePids.size !== 1 ? 'es' : ''} from <em>${escapeHtml(currentTrace?.command || '')}</em>
                </span>
            </h2>
            <div class="summary-grid">
                <div class="summary-card">
                    <h3>Subtree Overview</h3>
                    <div class="stat-row"><span class="label">Root PID</span><span class="value">${rootPid}</span></div>
                    ${progName ? `<div class="stat-row"><span class="label">Program</span><span class="value">${escapeHtml(progName)}</span></div>` : ''}
                    <div class="stat-row"><span class="label">Processes</span><span class="value">${uniquePids.size.toLocaleString()}</span></div>
                    <div class="stat-row"><span class="label">Programs exec'd</span><span class="value">${execCount.toLocaleString()}</span></div>
                    <div class="stat-row"><span class="label">Total Syscalls</span><span class="value">${eventCount.toLocaleString()}</span></div>
                    <div class="stat-row ${errorCount > 0 ? 'highlight' : ''}"><span class="label">Errors</span><span class="value" style="color:${errorCount > 0 ? 'var(--c-error)' : 'inherit'}">${errorCount.toLocaleString()}</span></div>
                    <div class="stat-row" style="align-items:flex-start"><span class="label" style="flex:0 0 45%">PIDs</span><span class="value" style="flex:0 0 50%;font-size:10px;text-align:right;word-break:break-all">${[...uniquePids].sort((a,b)=>a-b).join(', ')}</span></div>
                </div>
                
                <div class="summary-card">
                    <h3>Top Syscalls</h3>
                    ${topSyscalls.map(s => `
                        <div class="stat-row">
                            <span class="label">${escapeHtml(s.syscall)}</span>
                            <span class="value">${s.count.toLocaleString()}</span>
                        </div>
                    `).join('')}
                </div>
                
                <div class="summary-card">
                    <h3>Categories</h3>
                    ${Object.entries(catCounts).sort((a,b) => b[1]-a[1]).slice(0,8).map(([cat, count]) => {
                        const col = catColors[cat] || {bg:'#999'};
                        return `<div class="stat-row">
                            <span class="label"><span class="tag" style="background:${col.bg};color:${col.text || '#fff'}">${cat}</span></span>
                            <span class="value">${count.toLocaleString()}</span>
                        </div>`;
                    }).join('')}
                </div>
                
                <div class="summary-card">
                    <h3>I/O Summary</h3>
                    <div class="stat-row"><span class="label">Total Read</span><span class="value">${formatBytes(totalRead)}</span></div>
                    <div class="stat-row"><span class="label">Total Written</span><span class="value">${formatBytes(totalWrite)}</span></div>
                    ${netConnections.size > 0 ? `
                        <div class="stat-row"><span class="label">Network ↓</span><span class="value">${formatBytes(netRecv)}</span></div>
                        <div class="stat-row"><span class="label">Network ↑</span><span class="value">${formatBytes(netSend)}</span></div>
                        <div class="stat-row"><span class="label">Connections</span><span class="value">${netConnections.size}</span></div>
                    ` : ''}
                    ${topFilesSorted.length > 0 ? `<h3 style="margin-top:8px">Top Files</h3>` +
                        topFilesSorted.map(([path, bytes]) => `
                            <div class="stat-row">
                                <span class="label" title="${escapeHtml(path)}">${escapeHtml(path.split('/').pop())}</span>
                                <span class="value">${formatBytes(bytes)}</span>
                            </div>
                        `).join('') : '<div class="stat-row"><span class="label" style="color:var(--c-text-dim)">No file I/O</span></div>'}
                </div>
            </div>
        `;
    }
    
    // Column resizing
    (function setupColumnResize() {
        let resizing = null;
        let startX = 0;
        let startWidth = 0;
        
        tableHeader.addEventListener('mousedown', e => {
            const cell = e.target.closest('.cell.resizable');
            if (!cell) return;
            
            // Check if click is near the right edge (resize handle area)
            const rect = cell.getBoundingClientRect();
            if (e.clientX < rect.right - 8) return; // Not in resize zone
            
            e.preventDefault();
            resizing = cell.dataset.resize;
            startX = e.clientX;
            startWidth = cell.offsetWidth;
            
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });
        
        document.addEventListener('mousemove', e => {
            if (!resizing) return;
            
            const delta = e.clientX - startX;
            const newWidth = Math.max(40, startWidth + delta);
            document.documentElement.style.setProperty(`--col-${resizing}-width`, newWidth + 'px');
        });
        
        document.addEventListener('mouseup', () => {
            if (resizing) {
                resizing = null;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });
    })();
    
    // Init
    loadTraces().then(() => {
        checkUrlParams();
    });
})();
</script>
</body>
</html>
