<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexdump Viewer - f8</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            font-size: 13px;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header h1 { font-size: 1.2em; font-weight: 500; }
        .header a { color: #3498db; text-decoration: none; }
        .header a:hover { text-decoration: underline; }
        
        .info-bar {
            background: #252526;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            font-size: 12px;
            border-bottom: 1px solid #3c3c3c;
            flex-wrap: wrap;
        }
        .info-item { color: #888; }
        .info-item span { color: #d4d4d4; }
        .info-item .hostname { color: #2980b9; }
        
        .container {
            display: flex;
            height: calc(100vh - 90px);
        }
        
        .sidebar {
            width: 340px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar h3 {
            padding: 12px 16px;
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            border-bottom: 1px solid #3c3c3c;
        }
        .chunk-list { list-style: none; }
        .chunk-list li {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #2d2d2d;
            font-family: "SF Mono", Consolas, monospace;
            font-size: 11px;
            transition: background 0.1s;
            display: grid;
            grid-template-columns: 40px 24px 55px 75px 55px;
            gap: 8px;
            align-items: center;
        }
        .chunk-list li:hover { background: #2a2d2e; }
        .chunk-list li.active { background: #094771; }
        .chunk-list .col-chunk { color: #4ec9b0; }
        .chunk-list .col-rw { 
            text-align: center; 
            font-weight: bold;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .chunk-list .col-rw.read { color: #fff; background: #27ae60; }
        .chunk-list .col-rw.write { color: #fff; background: #e67e22; }
        .chunk-list .col-seq { color: #dcdcaa; }
        .chunk-list .col-offset { color: #569cd6; font-size: 10px; }
        .chunk-list .col-size { color: #888; text-align: right; }
        .chunk-header {
            display: grid;
            grid-template-columns: 40px 24px 55px 75px 55px;
            gap: 8px;
            padding: 6px 12px;
            font-size: 10px;
            color: #666;
            border-bottom: 1px solid #3c3c3c;
            text-transform: uppercase;
        }
        
        .hex-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }
        .hex-content {
            font-family: "SF Mono", Consolas, "Courier New", monospace;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre;
            padding: 16px 20px;
        }
        .hex-line { display: flex; height: 19px; }
        .hex-addr {
            color: #569cd6;
            width: 80px;
            flex-shrink: 0;
        }
        .hex-bytes {
            width: 400px;
            flex-shrink: 0;
        }
        .hex-ascii {
            color: #ce9178;
            padding-left: 16px;
        }
        
        .chunk-separator {
            height: 28px;
            display: flex;
            align-items: center;
            padding: 4px 0;
            margin: 4px 0;
            border-top: 1px dashed #444;
            color: #888;
            font-size: 11px;
        }
        .chunk-separator .badge {
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 10px;
        }
        .chunk-separator .badge.read { background: #27ae60; color: #fff; }
        .chunk-separator .badge.write { background: #e67e22; color: #fff; }
        .chunk-separator .syscall { color: #9cdcfe; margin-right: 10px; }
        .chunk-separator .size { color: #4ec9b0; }
        
        .chunk-read { background: rgba(39, 174, 96, 0.12); }
        .chunk-write { background: rgba(230, 126, 34, 0.12); }
        
        .highlight {
            background: rgba(255, 68, 68, 0.2) !important;
            border-left: 2px solid #ff4444;
            border-right: 2px solid #ff4444;
            margin-left: -2px;
            padding-left: 2px;
        }
        .hl-top { border-top: 2px solid #ff4444; }
        .hl-bottom { border-bottom: 2px solid #ff4444; }
        
        .loading { padding: 40px; text-align: center; color: #888; }
        .error { padding: 20px; color: #f48771; }
        
        .btn {
            padding: 6px 12px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn:hover { background: #1177bb; }
        .btn-sm { padding: 4px 8px; font-size: 11px; }
        
        .virtual-spacer { width: 100%; }
        .virtual-viewport {
            position: absolute;
            left: 0;
            right: 0;
            padding: 0 20px;
            font-family: "SF Mono", Consolas, "Courier New", monospace;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre;
        }
        
        .mode-badge {
            background: #8e44ad;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .jump-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-bottom: 1px solid #3c3c3c;
            background: #1e1e1e;
        }
        .jump-bar label { color: #888; font-size: 11px; }
        .jump-bar input {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 3px 8px;
            font-size: 11px;
            font-family: "SF Mono", Consolas, monospace;
            width: 100px;
            border-radius: 3px;
        }
        .jump-bar .line-info { color: #666; font-size: 11px; margin-left: auto; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 Hexdump Viewer</h1>
        <span class="mode-badge" id="mode-badge" style="display:none">Conversation</span>
        <div style="margin-left:auto">
            <button class="btn btn-sm" id="download-btn" style="display:none">Download Raw</button>
        </div>
    </div>
    
    <div class="info-bar" id="info-bar">
        <div class="info-item">Target: <span id="target-display">-</span></div>
        <div class="info-item">Total I/O: <span id="total-io">-</span></div>
        <div class="info-item">Chunks: <span id="chunkcount">-</span></div>
    </div>
    
    <div class="container">
        <div class="sidebar" id="sidebar">
            <h3>I/O Chunks</h3>
            <div class="chunk-header">
                <span>#</span>
                <span>R/W</span>
                <span>Seq</span>
                <span>Offset</span>
                <span>Size</span>
            </div>
            <ul class="chunk-list" id="chunk-list">
                <li class="loading" style="display:block;grid-template-columns:1fr">Loading...</li>
            </ul>
        </div>
        <div class="hex-container" id="hex-container">
            <div class="loading">Loading hexdump...</div>
        </div>
    </div>

<script>
(function() {
    const ROW_HEIGHT = 19;
    const PAGE_SIZE = 500;
    const BUFFER_LINES = 100;
    
    const params = new URLSearchParams(window.location.search);
    const traceId = params.get('trace') || '1';
    const file = params.get('file');
    const targetParam = params.get('target');
    let currentHighlight = parseInt(params.get('chunk'), 10);
    if (isNaN(currentHighlight)) currentHighlight = 0;
    
    const isConversationMode = !!targetParam;
    
    if (isConversationMode) {
        document.getElementById('mode-badge').style.display = '';
        loadConversation(targetParam);
    } else if (file) {
        loadSingleFile(file);
    } else {
        document.getElementById('hex-container').innerHTML = '<div class="error">No file or target specified</div>';
    }
    
    // ========== CONVERSATION MODE (unchanged) ==========
    async function loadConversation(target) {
        document.getElementById('target-display').textContent = target;
        
        try {
            const dnsRes = await fetch(`/api/traces/${traceId}/dns`);
            const dnsLookups = dnsRes.ok ? await dnsRes.json() : [];
            
            const targetIp = target.split(':')[0];
            const lookup = dnsLookups.find(d => d.ip === target || d.ip.split(':')[0] === targetIp);
            if (lookup) {
                document.getElementById('target-display').innerHTML = 
                    `${escapeHtml(target)} <span class="hostname">/ ${escapeHtml(lookup.hostname)}</span>`;
            }
            
            const eventsRes = await fetch(`/api/traces/${traceId}/target-events?target=${encodeURIComponent(target)}`);
            if (!eventsRes.ok) throw new Error('Failed to fetch target events');
            const data = await eventsRes.json();
            
            if (!data.events || data.events.length === 0) {
                document.getElementById('hex-container').innerHTML = '<div class="error">No I/O data for this target</div>';
                document.getElementById('sidebar').style.display = 'none';
                return;
            }
            
            const chunks = [];
            let totalBytes = 0;
            let globalOffset = 0;
            
            for (const evt of data.events) {
                const isRead = /read|recv/i.test(evt.syscall);
                const isWrite = /write|send/i.test(evt.syscall);
                chunks.push({ seq: evt.seq, syscall: evt.syscall, bytes: evt.bytes, isRead, isWrite, ioPath: evt.ioPath, chunk: evt.chunk, globalOffset, hexLines: null });
                totalBytes += evt.bytes;
                globalOffset += evt.bytes;
            }
            
            document.getElementById('chunkcount').textContent = chunks.length;
            document.getElementById('total-io').textContent = formatBytes(totalBytes);
            
            renderConversationChunkList(chunks);
            await loadAllHexdumps(chunks, data.ioDir);
            renderConversationHex(chunks);
            
            if (chunks[currentHighlight]) {
                setTimeout(() => scrollToChunkConversation(currentHighlight, chunks), 100);
            }
        } catch (err) {
            console.error(err);
            document.getElementById('hex-container').innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
        }
    }
    
    function renderConversationChunkList(chunks) {
        const chunkList = document.getElementById('chunk-list');
        chunkList.innerHTML = chunks.map((c, i) => `
            <li data-idx="${i}" class="${i === currentHighlight ? 'active' : ''}">
                <span class="col-chunk">#${i + 1}</span>
                <span class="col-rw ${c.isRead ? 'read' : 'write'}">${c.isRead ? '↓R' : '↑W'}</span>
                <span class="col-seq">${c.seq}</span>
                <span class="col-offset">+${formatBytes(c.globalOffset)}</span>
                <span class="col-size">${formatBytes(c.bytes)}</span>
            </li>
        `).join('');
        
        chunkList.addEventListener('click', e => {
            const li = e.target.closest('li[data-idx]');
            if (li) {
                const idx = parseInt(li.dataset.idx, 10);
                setHighlightConversation(idx, chunks);
                scrollToChunkConversation(idx, chunks);
            }
        });
    }
    
    async function loadAllHexdumps(chunks, ioDir) {
        await Promise.all(chunks.map(async (chunk) => {
            if (!chunk.ioPath) { chunk.hexLines = []; return; }
            const filename = chunk.ioPath.split('/').pop();
            const hexFile = filename.replace(/\.bin$/, '.bin.hexdump');
            try {
                const res = await fetch(`/api/traces/${traceId}/io/${hexFile}`);
                if (res.ok) {
                    const text = await res.text();
                    chunk.hexLines = parseHexdumpText(text);
                } else { chunk.hexLines = []; }
            } catch (e) { chunk.hexLines = []; }
        }));
    }
    
    function parseHexdumpText(text) {
        const lines = text.split('\n');
        const parsed = [];
        for (const line of lines) {
            if (!line.trim()) continue;
            const match = line.match(/^([0-9a-f]+)\s+(.+?)\s+\|(.+)\|$/i);
            if (match) {
                parsed.push({ addr: parseInt(match[1], 16), addrStr: match[1], bytes: match[2].split(/\s+/).filter(b => b), ascii: match[3] });
            }
        }
        return parsed;
    }
    
    function renderConversationHex(chunks) {
        const container = document.getElementById('hex-container');
        let html = '<div class="hex-content">';
        for (let i = 0; i < chunks.length; i++) {
            const chunk = chunks[i];
            const isActive = i === currentHighlight;
            const rwClass = chunk.isRead ? 'read' : 'write';
            const bgClass = chunk.isRead ? 'chunk-read' : 'chunk-write';
            
            html += `<div class="chunk-separator" data-chunk="${i}"><span class="badge ${rwClass}">${chunk.isRead ? '↓ READ' : '↑ WRITE'}</span><span class="syscall">${chunk.syscall}()</span><span class="size">${formatBytes(chunk.bytes)}</span><span style="margin-left:auto;color:#666">seq ${chunk.seq}</span></div>`;
            
            if (chunk.hexLines && chunk.hexLines.length > 0) {
                for (let j = 0; j < chunk.hexLines.length; j++) {
                    const line = chunk.hexLines[j];
                    let lineClass = bgClass;
                    if (isActive) { lineClass += ' highlight'; if (j === 0) lineClass += ' hl-top'; if (j === chunk.hexLines.length - 1) lineClass += ' hl-bottom'; }
                    html += `<div class="hex-line ${lineClass}" data-chunk="${i}"><span class="hex-addr">${line.addrStr}</span><span class="hex-bytes">${line.bytes.join(' ')}</span><span class="hex-ascii">|${escapeHtml(line.ascii)}|</span></div>`;
                }
            } else {
                html += `<div class="hex-line ${bgClass}" style="color:#666" data-chunk="${i}">  (no data captured)</div>`;
            }
        }
        html += '</div>';
        container.innerHTML = html;
    }
    
    function setHighlightConversation(idx, chunks) {
        currentHighlight = idx;
        document.getElementById('chunk-list').querySelectorAll('li').forEach(l => l.classList.remove('active'));
        const activeLi = document.getElementById('chunk-list').querySelector(`li[data-idx="${idx}"]`);
        if (activeLi) activeLi.classList.add('active');
        renderConversationHex(chunks);
    }
    
    function scrollToChunkConversation(idx) {
        const sep = document.querySelector(`.chunk-separator[data-chunk="${idx}"]`);
        if (sep) sep.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    
    // ========== SINGLE FILE MODE — VIRTUAL SCROLLING ==========
    function loadSingleFile(file) {
        document.getElementById('mode-badge').style.display = 'none';
        document.getElementById('download-btn').style.display = '';
        
        const baseName = file.replace(/\.(hexdump|rendered)$/, '').replace(/\.bin$/, '');
        const binFile = baseName + '.bin';
        const hexFile = baseName + '.bin.hexdump';
        const metaFile = baseName + '.bin.meta.json';
        
        const isWrite = /-(write|send|sendto|sendmsg)-/i.test(file);
        const isRead = /-(read|recv|recvfrom|recvmsg)-/i.test(file);
        const rwLabel = isWrite ? '↑W' : (isRead ? '↓R' : '?');
        const rwClass = isWrite ? 'write' : (isRead ? 'read' : '');
        
        const filenameParts = file.replace(/\.bin$/, '').split('-');
        let fileTarget = filenameParts.length >= 4 ? filenameParts.slice(3).join('-') : file;
        document.getElementById('target-display').textContent = fileTarget;
        
        document.getElementById('download-btn').onclick = () => {
            window.open(`/api/traces/${traceId}/io/${binFile}`, '_blank');
        };
        
        fetch(`/api/traces/${traceId}/dns`).then(r => r.ok ? r.json() : []).then(dnsLookups => {
            const targetIp = fileTarget.split(':')[0];
            const lookup = dnsLookups.find(d => d.ip === fileTarget || d.ip.split(':')[0] === targetIp);
            if (lookup) {
                document.getElementById('target-display').innerHTML = 
                    `${escapeHtml(fileTarget)} <span class="hostname">/ ${escapeHtml(lookup.hostname)}</span>`;
            }
        }).catch(() => {});
        
        // Virtual scroll state
        let totalLines = 0;
        let chunks = [];
        let hlStart = -1, hlEnd = -1;
        const pageCache = new Map();
        const pendingFetches = new Set();
        const container = document.getElementById('hex-container');
        let spacer, viewport, scrollWrap;
        
        // Load metadata + line count in parallel
        Promise.all([
            fetch(`/api/traces/${traceId}/io/${metaFile}`).then(r => r.ok ? r.json() : null).catch(() => null),
            fetch(`/api/traces/${traceId}/hexdump-lines/${hexFile}?limit=-1`).then(r => r.ok ? r.json() : null).catch(() => null)
        ]).then(([meta, hexMeta]) => {
            if (!hexMeta || !hexMeta.totalLines) {
                return loadSingleFileFallback(file, meta, rwLabel, rwClass);
            }
            
            totalLines = hexMeta.totalLines;
            
            if (meta && meta.offsets) {
                chunks = meta.offsets;
                document.getElementById('total-io').textContent = formatBytes(meta.total_size);
                document.getElementById('chunkcount').textContent = chunks.length;
                renderSingleFileChunkList(chunks, rwLabel, rwClass);
                if (chunks[currentHighlight]) {
                    hlStart = chunks[currentHighlight].offset;
                    hlEnd = hlStart + chunks[currentHighlight].length;
                }
            } else {
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('chunkcount').textContent = 'N/A';
            }
            
            if (!document.getElementById('total-io').textContent || document.getElementById('total-io').textContent === '-') {
                document.getElementById('total-io').textContent = formatBytes(hexMeta.fileSize || 0);
            }
            
            initVirtualScroll();
            
            if (chunks[currentHighlight]) {
                const lineIdx = Math.floor(chunks[currentHighlight].offset / 16);
                setTimeout(() => scrollToLine(lineIdx), 200);
            }
        });
        
        function initVirtualScroll() {
            const totalHeight = totalLines * ROW_HEIGHT + 32;
            container.innerHTML = '';
            container.style.overflow = 'hidden';
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            
            // Jump bar
            const jumpBar = document.createElement('div');
            jumpBar.className = 'jump-bar';
            jumpBar.innerHTML = `<label>Jump to offset:</label><input type="text" id="jump-offset" placeholder="0x000000"><button class="btn btn-sm" id="jump-btn">Go</button><span class="line-info" id="line-info">${totalLines.toLocaleString()} lines</span>`;
            container.appendChild(jumpBar);
            
            scrollWrap = document.createElement('div');
            scrollWrap.id = 'scroll-wrap';
            scrollWrap.style.cssText = 'position:relative;overflow:auto;flex:1;';
            
            spacer = document.createElement('div');
            spacer.className = 'virtual-spacer';
            spacer.style.height = totalHeight + 'px';
            
            viewport = document.createElement('div');
            viewport.className = 'virtual-viewport';
            
            scrollWrap.appendChild(spacer);
            scrollWrap.appendChild(viewport);
            container.appendChild(scrollWrap);
            
            let rafPending = false;
            scrollWrap.addEventListener('scroll', () => {
                if (!rafPending) {
                    rafPending = true;
                    requestAnimationFrame(() => { renderVisibleLines(); rafPending = false; });
                }
            });
            
            document.getElementById('jump-btn').addEventListener('click', doJump);
            document.getElementById('jump-offset').addEventListener('keydown', e => { if (e.key === 'Enter') doJump(); });
            
            renderVisibleLines();
        }
        
        function doJump() {
            const input = document.getElementById('jump-offset').value.trim();
            let offset;
            if (input.startsWith('0x') || input.startsWith('0X')) { offset = parseInt(input, 16); }
            else { offset = parseInt(input, 10); }
            if (!isNaN(offset)) scrollToLine(Math.floor(offset / 16));
        }
        
        function scrollToLine(lineIdx) {
            if (scrollWrap) {
                scrollWrap.scrollTop = Math.max(0, lineIdx * ROW_HEIGHT - scrollWrap.clientHeight / 3);
            }
        }
        
        function renderVisibleLines() {
            if (!scrollWrap || !viewport) return;
            const scrollTop = scrollWrap.scrollTop;
            const viewHeight = scrollWrap.clientHeight;
            
            const firstVisible = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - BUFFER_LINES);
            const lastVisible = Math.min(totalLines - 1, Math.ceil((scrollTop + viewHeight) / ROW_HEIGHT) + BUFFER_LINES);
            
            const firstPage = Math.floor(firstVisible / PAGE_SIZE);
            const lastPage = Math.floor(lastVisible / PAGE_SIZE);
            
            for (let p = firstPage; p <= lastPage; p++) {
                if (!pageCache.has(p) && !pendingFetches.has(p)) fetchPage(p);
            }
            
            let html = '';
            for (let lineIdx = firstVisible; lineIdx <= lastVisible; lineIdx++) {
                const pageIdx = Math.floor(lineIdx / PAGE_SIZE);
                const pageOffset = lineIdx % PAGE_SIZE;
                const page = pageCache.get(pageIdx);
                
                if (page && pageOffset < page.length) {
                    html += renderHexLine(page[pageOffset], rwClass);
                } else {
                    html += '<div class="hex-line" style="height:' + ROW_HEIGHT + 'px;color:#444">        loading...</div>';
                }
            }
            
            viewport.innerHTML = html;
            viewport.style.top = (firstVisible * ROW_HEIGHT + 16) + 'px';
            
            const centerLine = Math.floor((scrollTop + viewHeight / 2) / ROW_HEIGHT);
            const centerOffset = centerLine * 16;
            const lineInfo = document.getElementById('line-info');
            if (lineInfo) {
                lineInfo.textContent = 'Line ' + centerLine.toLocaleString() + ' / ' + totalLines.toLocaleString() + ' \u2014 offset 0x' + centerOffset.toString(16).padStart(8, '0');
            }
        }
        
        async function fetchPage(pageIdx) {
            pendingFetches.add(pageIdx);
            const offset = pageIdx * PAGE_SIZE;
            try {
                const res = await fetch('/api/traces/' + traceId + '/hexdump-lines/' + hexFile + '?offset=' + offset + '&limit=' + PAGE_SIZE);
                if (res.ok) {
                    const data = await res.json();
                    pageCache.set(pageIdx, data.lines);
                } else {
                    pageCache.set(pageIdx, []);
                }
            } catch (e) {
                console.error('Failed to fetch page ' + pageIdx + ':', e);
                pageCache.set(pageIdx, []);
            }
            pendingFetches.delete(pageIdx);
            renderVisibleLines();
        }
        
        function renderHexLine(line, rwClass) {
            const lineStart = line.addr;
            const lineEnd = lineStart + 16;
            const inHighlight = hlStart >= 0 && lineEnd > hlStart && lineStart < hlEnd;
            const isFirst = inHighlight && lineStart <= hlStart && hlStart < lineEnd;
            const isLast = inHighlight && lineStart < hlEnd && hlEnd <= lineEnd;
            
            let cls = rwClass === 'write' ? 'chunk-write' : 'chunk-read';
            if (inHighlight) { cls += ' highlight'; if (isFirst) cls += ' hl-top'; if (isLast) cls += ' hl-bottom'; }
            
            return '<div class="hex-line ' + cls + '" style="height:' + ROW_HEIGHT + 'px"><span class="hex-addr">' + line.addrStr + '</span><span class="hex-bytes">' + escapeHtml(line.bytes) + '</span><span class="hex-ascii">|' + escapeHtml(line.ascii) + '|</span></div>';
        }
        
        function renderSingleFileChunkList(chks, rwLabel, rwClass) {
            const chunkList = document.getElementById('chunk-list');
            chunkList.innerHTML = chks.map((c, i) => '<li data-idx="' + i + '" class="' + (i === currentHighlight ? 'active' : '') + '"><span class="col-chunk">#' + (i + 1) + '</span><span class="col-rw ' + rwClass + '">' + rwLabel + '</span><span class="col-seq">' + (c.seq !== undefined ? c.seq : '\u2014') + '</span><span class="col-offset">0x' + c.offset.toString(16).padStart(6, '0') + '</span><span class="col-size">' + formatBytes(c.length) + '</span></li>').join('');
            
            chunkList.addEventListener('click', e => {
                const li = e.target.closest('li[data-idx]');
                if (li) {
                    const idx = parseInt(li.dataset.idx, 10);
                    currentHighlight = idx;
                    chunkList.querySelectorAll('li').forEach(l => l.classList.remove('active'));
                    li.classList.add('active');
                    if (chunks[idx]) { hlStart = chunks[idx].offset; hlEnd = hlStart + chunks[idx].length; }
                    scrollToLine(Math.floor(chunks[idx].offset / 16));
                    renderVisibleLines();
                }
            });
        }
        
        // Fallback for small files or when paginated API unavailable
        function loadSingleFileFallback(file, meta, rwLabel, rwClass) {
            const hf = file.replace(/\.(hexdump|rendered)$/, '').replace(/\.bin$/, '') + '.bin.hexdump';
            fetch('/api/traces/' + traceId + '/io/' + hf).then(r => r.ok ? r.text() : null).then(hexText => {
                if (!hexText) { container.innerHTML = '<div class="error">Could not load hexdump</div>'; return; }
                const parsedLines = parseHexdumpText(hexText);
                if (meta && meta.offsets) {
                    chunks = meta.offsets;
                    document.getElementById('total-io').textContent = formatBytes(meta.total_size);
                    document.getElementById('chunkcount').textContent = chunks.length;
                    renderSingleFileChunkList(chunks, rwLabel, rwClass);
                    if (chunks[currentHighlight]) { hlStart = chunks[currentHighlight].offset; hlEnd = hlStart + chunks[currentHighlight].length; }
                } else { document.getElementById('sidebar').style.display = 'none'; }
                
                let html = '<div class="hex-content">';
                for (const line of parsedLines) {
                    const ls = line.addr, le = ls + line.bytes.length;
                    const inH = hlStart >= 0 && le > hlStart && ls < hlEnd;
                    let cls = rwClass === 'write' ? 'chunk-write' : 'chunk-read';
                    if (inH) { cls += ' highlight'; if (ls <= hlStart && hlStart < le) cls += ' hl-top'; if (ls < hlEnd && hlEnd <= le) cls += ' hl-bottom'; }
                    html += '<div class="hex-line ' + cls + '"><span class="hex-addr">' + line.addrStr + '</span><span class="hex-bytes">' + line.bytes.join(' ') + '</span><span class="hex-ascii">|' + escapeHtml(line.ascii) + '|</span></div>';
                }
                html += '</div>';
                container.innerHTML = html;
            });
        }
    }
    
    // ========== UTILITIES ==========
    function formatBytes(n) {
        if (!n && n !== 0) return '-';
        if (n < 1024) return n + 'B';
        if (n < 1048576) return (n/1024).toFixed(1) + 'K';
        return (n/1048576).toFixed(1) + 'M';
    }
    
    function escapeHtml(s) {
        return s ? String(s).replace(/[&<>"]/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }) : '';
    }
})();
</script>
